# ============================================================
#  AiPhone 统一 Docker 编排
#  Java 后端 (:8080) + Python IVR (:8000) + PostgreSQL + Redis
#  使用方式：
#    1. 复制 .env.example 为 .env，填入真实凭证
#    2. docker compose up -d
# ============================================================

services:

  # ────────────────────────── 数据库 ──────────────────────────
  postgres:
    image: postgres:15
    container_name: aiphone-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_phone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - aiphone-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_phone"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ────────────────────────── 缓存 ──────────────────────────
  redis:
    image: redis:7
    container_name: aiphone-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - aiphone-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ──────────────────────── Java 后端 ────────────────────────
  java-backend:
    build:
      context: ./aiphone-src
      dockerfile: Dockerfile
    container_name: aiphone-java
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # CCC 凭证（从 .env 注入）
      CCC_AK_ID: ${ALIYUN_ACCESS_KEY_ID}
      CCC_AK_SECRET: ${ALIYUN_ACCESS_KEY_SECRET}
      CCC_INSTANCE_ID: demo-1334882287961657
      # RocketMQ
      CCC_MQ_ENDPOINT: ${ROCKETMQ_ENDPOINT}
      CCC_MQ_TOPIC: dadong
      CCC_MQ_GROUP: GID_CCC_JAVA_CONSUMER
      # RocketMQ 5.x 公网访问必须填写实例用户名/密码/命名空间（实例ID）
      CCC_MQ_USERNAME: ${ROCKETMQ_ACCESS_KEY}
      CCC_MQ_PASSWORD: ${ROCKETMQ_ACCESS_SECRET}
      CCC_MQ_NAMESPACE: ${ROCKETMQ_INSTANCE_ID}
      # DashScope ASR
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"
    volumes:
      - java-logs:/app/logs
    networks:
      - aiphone-net

  # ──────────────────────── Python IVR ────────────────────────
  python-ivr:
    build:
      context: ./IVR
      dockerfile: Dockerfile
    container_name: aiphone-python
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 敏感凭证通过环境变量注入（pydantic-settings 优先读环境变量）
      ALIYUN_ACCESS_KEY_ID: ${ALIYUN_ACCESS_KEY_ID}
      ALIYUN_ACCESS_KEY_SECRET: ${ALIYUN_ACCESS_KEY_SECRET}
      ROCKETMQ_ENDPOINT: ${ROCKETMQ_ENDPOINT}
      ROCKETMQ_INSTANCE_ID: ${ROCKETMQ_INSTANCE_ID}
      ROCKETMQ_GROUP_ID: GID_CCC_PYTHON_CONSUMER
      ROCKETMQ_ACCESS_KEY: ${ROCKETMQ_ACCESS_KEY}
      ROCKETMQ_ACCESS_SECRET: ${ROCKETMQ_ACCESS_SECRET}
      BEEBOT_AGENT_KEY: ${BEEBOT_AGENT_KEY}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      TZ: Asia/Shanghai
    ports:
      - "8000:8000"
    volumes:
      # 非敏感配置挂载为 .env
      - ./IVR/.env.docker:/app/.env:ro
      # 知识库 Excel 挂载
      - ./IVR/副本知识库导出记录-20260629.xlsx:/app/data/副本知识库导出记录-20260629.xlsx:ro
      # SQLite 智能坐席库持久化
      - python-data:/app/data
    networks:
      - aiphone-net

volumes:
  pg-data:
  redis-data:
  java-logs:
  python-data:

networks:
  aiphone-net:
    driver: bridge
