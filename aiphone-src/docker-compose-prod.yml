# 生产环境 Docker Compose 配置（阿里云 ECS 部署用）
# 部署方式：docker compose -f docker-compose-prod.yml up -d --build
#
# 架构：
#   Redis（容器，6379） ←─── 内网 ─── AIPhone 应用（容器，8080） ───→ 公网 182.92.203.31:8080
#                                         └──→ RDS PostgreSQL（内网 pgm-xxx:5432）
#                                         └──→ RocketMQ（阿里云公网 rmq-cn-xxx:8080）

services:

  # ==================== Redis ====================
  # 应用依赖 Redis，必须在同一 compose 文件里定义，否则 depends_on 会报错
  redis:
    image: redis:7
    container_name: aiphone-redis
    restart: always
    ports:
      - "6380:6379"  # 与开发环境 compose.yaml 保持一致（宿主机 6380 → 容器 6379）
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==================== AIPhone 应用 ====================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aiphone-app
    restart: always
    ports:
      - "8080:8080"  # 暴露公网（安全组需开放 8080）
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - TZ=Asia/Shanghai
      # 覆盖 application.yml 里的 localhost:6380
      # 容器内 localhost 指容器自身，需走 docker 网络的服务名 redis:6379
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      # 禁用 RabbitMQ 自动配置：pom.xml 有 spring-boot-starter-amqp 但项目未使用，
      # 不排除的话 Spring Boot 启动会尝试连 localhost:5673 失败
      - SPRING_AUTOCONFIGURE_EXCLUDE=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      # 登录用户表和已有业务表均使用幂等建表脚本，允许新旧数据库平滑升级
      - SPRING_SQL_INIT_MODE=always
      # RocketMQ 域名不可解析时不应阻塞登录和工单 Web 接口启动
      - CCC_MQ_ENABLED=false
      # DashScope API Key（可选，用到 ASR 时才需要）
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET}
      - AUTH_BOOTSTRAP_PASSWORD=${AUTH_BOOTSTRAP_PASSWORD}
    volumes:
      # 日志持久化到宿主机
      - ./logs:/app/logs
      # 测试前端也挂载出来方便访问（可选）
      - ../test-frontend:/app/static
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  redis-data:
