services:
  postgres:
    image: 'postgres:15'
    environment:
      - 'POSTGRES_DB=ai_phone'
      - 'POSTGRES_PASSWORD=123456'
      - 'POSTGRES_USER=postgres'
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
  rabbitmq:
    image: 'rabbitmq:3'
    environment:
      - 'RABBITMQ_DEFAULT_USER=myuser'
      - 'RABBITMQ_DEFAULT_PASS=secret'
    ports:
      - '5673:5672'
  redis:
    image: 'redis:7'
    ports:
      - '6380:6379'

volumes:
  pgdata:
